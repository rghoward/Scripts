<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Extended Euclidean Algorithm Visualizer</title>
  <style>
    :root{color-scheme:dark;--bg:#07121e;--panel:#101f30;--line:#29425d;--ink:#edf5ff;--muted:#9eb2c8;--cyan:#45d9d0;--gold:#ffc857;--pink:#ff7b92}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0,#173753,transparent 36%),var(--bg);color:var(--ink);font:15px/1.45 Inter,system-ui,sans-serif}main{width:min(1100px,94vw);margin:30px auto}h1{font-size:clamp(1.8rem,4vw,2.7rem);margin:0}.sub{color:var(--muted);margin:5px 0 22px}.grid{display:grid;grid-template-columns:310px 1fr;gap:18px}.card{background:#101f30ee;border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 55px #0005}aside{padding:18px}label{display:block;color:var(--muted);font-size:.84rem;margin:11px 0 5px}input,button{width:100%;padding:11px;border-radius:9px;border:1px solid #38536f;background:#091728;color:var(--ink);font:inherit}input:focus{outline:2px solid #45d9d055;border-color:var(--cyan)}button{font-weight:750;cursor:pointer;transition:.15s}button:hover{transform:translateY(-1px);border-color:var(--cyan)}.primary{background:var(--cyan);border:0;color:#052522}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}#status{margin-top:14px;padding:11px;border-radius:9px;background:#091626;color:var(--muted);min-height:45px}.good{color:#8ff1bf!important}.bad{color:var(--pink)!important}.stage{padding:22px;min-height:390px}.formula{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;min-height:115px;font:700 clamp(1.1rem,3vw,1.7rem)/1.3 ui-monospace,SFMono-Regular,monospace}.term{padding:13px 16px;background:#0a1828;border:1px solid #34516e;border-radius:12px}.quotient{color:var(--gold)}.remainder{color:var(--cyan)}.arrow{text-align:center;color:var(--muted);font-size:1.5rem}.bezout{margin:18px auto 0;max-width:680px;padding:18px;text-align:center;border:1px solid #34516e;border-radius:13px;background:#0a1828}.bezout .big{font:700 clamp(1rem,2.6vw,1.45rem) ui-monospace,monospace;margin:9px 0;color:var(--cyan)}.bars{height:118px;display:flex;gap:4px;align-items:flex-end;justify-content:center;margin:15px 0}.bar{min-width:32px;max-width:92px;flex:1;border-radius:7px 7px 2px 2px;background:linear-gradient(var(--cyan),#207f91);display:flex;align-items:flex-start;justify-content:center;padding-top:5px;font-weight:700;color:#042128;transition:.35s}.bar.old{background:linear-gradient(var(--gold),#9e6820)}.table-card{margin-top:18px;padding:14px;overflow:auto}table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}th,td{text-align:right;padding:10px 12px;border-bottom:1px solid #263f58}th{font-size:.8rem;color:var(--muted)}th:first-child,td:first-child{text-align:center}tr.current{color:var(--gold);background:#ffc8570a}.note{font-size:.8rem;color:var(--muted);margin-top:10px}@media(max-width:760px){.grid{grid-template-columns:1fr}.stage{min-height:340px}}
  </style>
</head>
<body><main>
  <h1>Extended Euclidean Algorithm</h1><p class="sub">See how repeated division finds the GCD and its Bézout coefficients.</p>
  <section class="grid"><aside class="card">
    <label for="a">First integer a</label><input id="a" type="number" step="1" value="240">
    <label for="b">Second integer b</label><input id="b" type="number" step="1" value="46">
    <div class="row"><button id="reset">Reset</button><button id="step" class="primary">Next step</button></div>
    <div class="row"><button id="play">▶ Animate</button><button id="solve">Solve fully</button></div>
    <div id="status" aria-live="polite">Ready. Press “Next step”.</div>
    <p class="note">The algorithm maintains<br><strong>r = s·a + t·b</strong> at every step.</p>
  </aside><section class="card stage">
    <div class="formula" id="formula">Enter two integers to begin.</div>
    <div class="bars" id="bars"></div>
    <div class="bezout"><div>Bézout identity</div><div class="big" id="identity">—</div><div id="inverse" class="note"></div></div>
  </section></section>
  <section class="card table-card"><table><thead><tr><th>Step</th><th>Quotient q</th><th>Remainder r</th><th>Coefficient s</th><th>Coefficient t</th><th>Check: s·a + t·b</th></tr></thead><tbody id="rows"></tbody></table></section>
</main><script>
const $=s=>document.querySelector(s);let states=[],index=0,timer=null,A=0,B=0;
function build(){stop();A=Math.trunc(Number($('#a').value));B=Math.trunc(Number($('#b').value));if(!Number.isSafeInteger(A)||!Number.isSafeInteger(B)||A===0&&B===0){states=[];setStatus('Enter two safe integers, not both zero.','bad');return render()}let oldR=Math.abs(A),r=Math.abs(B),oldS=A<0?-1:1,s=0,oldT=0,t=B<0?-1:1;states=[{r:oldR,s:oldS,t:oldT,q:null,prev:null}];let guard=0;while(r!==0&&guard++<100){const q=Math.floor(oldR/r),nr=oldR-q*r,ns=oldS-q*s,nt=oldT-q*t;states.push({r,s,t,q,prev:oldR,next:nr});[oldR,r]=[r,nr];[oldS,s]=[s,ns];[oldT,t]=[t,nt]}states.at(-1).final=true;index=0;setStatus(states.length===1?`Complete: gcd(${A}, ${B}) = ${states[0].r}.`:'Ready. Press “Next step”.',states.length===1?'good':'');render()}
function advance(){if(index<states.length-1){index++;render();if(states[index].final){setStatus(`Complete: gcd(${A}, ${B}) = ${states[index].r}.`,'good');stop()}else setStatus(`Step ${index}: compute the next remainder.`,'')}else stop()}
function solve(){index=states.length-1;render();if(states.length)setStatus(`Complete: gcd(${A}, ${B}) = ${states[index].r}.`,'good');stop()}
function stop(){clearInterval(timer);timer=null;$('#play').textContent='▶ Animate'}function setStatus(t,c){$('#status').textContent=t;$('#status').className=c}
function render(){const shown=states.slice(0,index+1),cur=shown.at(-1);if(!cur){$('#formula').textContent='Enter two integers to begin.';$('#rows').innerHTML='';return}if(index===0)$('#formula').innerHTML=`<span class="term">r₀ = ${cur.r}</span><span class="arrow">→</span><span class="term">start</span>`;else if(cur.final)$('#formula').innerHTML=`<span class="term remainder">gcd = ${cur.r}</span><span class="arrow">✓</span>`;else $('#formula').innerHTML=`<span class="term">${cur.prev}</span> = <span class="term quotient">${cur.q} × ${cur.r}</span> + <span class="term remainder">${cur.next}</span>`;
 const max=Math.max(1,...shown.map(x=>Math.abs(x.r)));$('#bars').innerHTML=shown.slice(-8).map((x,j,a)=>`<div class="bar ${j<a.length-1?'old':''}" style="height:${25+85*Math.abs(x.r)/max}px" title="r = ${x.r}">${x.r}</div>`).join('');
 const result=cur.final?cur:shown.filter(x=>x.r!==0).at(-1);$('#identity').textContent=`${result.r} = (${result.s})·${A} + (${result.t})·${B}`;const g=Math.abs(result.r);let msg='';if(cur.final&&g===1){if(Math.abs(B)>1){const invA=((result.s%B)+Math.abs(B))%Math.abs(B);msg+=`${A}⁻¹ mod ${Math.abs(B)} = ${invA}. `}if(Math.abs(A)>1){const invB=((result.t%A)+Math.abs(A))%Math.abs(A);msg+=`${B}⁻¹ mod ${Math.abs(A)} = ${invB}.`}}$('#inverse').textContent=msg;
 $('#rows').innerHTML=shown.map((x,i)=>`<tr class="${i===index?'current':''}"><td>${i}</td><td>${x.q??'—'}</td><td>${x.r}</td><td>${x.s}</td><td>${x.t}</td><td>${x.s*A+x.t*B}</td></tr>`).join('')}
$('#reset').onclick=build;$('#step').onclick=advance;$('#solve').onclick=solve;$('#play').onclick=()=>{if(timer)stop();else{if(index>=states.length-1)build();timer=setInterval(advance,800);$('#play').textContent='⏸ Pause'}};$('#a').onchange=build;$('#b').onchange=build;build();
</script></body></html>
