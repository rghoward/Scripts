<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Modular Arithmetic Circle Lab</title>
  <style>
    :root{color-scheme:dark;--bg:#071018;--panel:#111b25;--panel2:#0b151e;--line:#304453;--ink:#f4f7f9;--muted:#9fb0bd;--mint:#55d6be;--gold:#ffd166;--red:#ff6b7d;--blue:#62a8ff}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font:15px/1.45 Inter,system-ui,sans-serif}button,input,select{font:inherit}main{width:min(1260px,95vw);margin:22px auto 40px}h1{margin:0;font-size:clamp(1.8rem,4vw,2.6rem);letter-spacing:0}.sub{margin:4px 0 18px;color:var(--muted)}
    .tabs{display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--line);margin-bottom:16px}.tab{width:auto;min-width:112px;padding:10px 15px;border:0;border-bottom:3px solid transparent;background:transparent;color:var(--muted);cursor:pointer;font-weight:800}.tab.active{color:var(--ink);border-color:var(--mint)}
    .layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:16px}.panel,.stage,.lower{border:1px solid var(--line);border-radius:8px;background:var(--panel)}.panel{padding:16px;align-self:start}.control-pane{display:none}.control-pane.active{display:block}h2{font-size:1.05rem;margin:0 0 10px}label{display:flex;justify-content:space-between;gap:10px;margin:11px 0 5px;color:var(--muted);font-size:.84rem}label output{color:var(--ink);font-weight:800}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    input[type=number],select,button{width:100%;min-height:40px;border:1px solid #405767;border-radius:6px;background:var(--panel2);color:var(--ink)}input[type=number],select{padding:8px 9px}input[type=range]{width:100%;accent-color:var(--mint)}button{padding:8px 10px;cursor:pointer;font-weight:750}button:hover{border-color:var(--mint)}button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid #55d6be55;border-color:var(--mint)}.primary{background:var(--mint);border-color:var(--mint);color:#05251f}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:13px}.check{justify-content:flex-start;align-items:center}.check input{accent-color:var(--mint)}
    .readout{margin-top:14px;padding:11px;border:1px solid var(--line);border-radius:6px;background:var(--panel2)}.readout small{display:block;color:var(--muted)}.readout strong{display:block;margin:2px 0;color:var(--gold);font-size:1.08rem;overflow-wrap:anywhere}.detail{color:var(--muted);font-variant-numeric:tabular-nums;overflow-wrap:anywhere}.stage{position:relative;min-height:650px;background:#09131c;overflow:hidden}svg{display:block;width:100%;height:650px}.ring{fill:none;stroke:#223440;stroke-width:1}.spoke{stroke:#334956;stroke-width:1}.node{stroke:#071018;stroke-width:2;cursor:pointer}.node-text{fill:#071018;text-anchor:middle;dominant-baseline:central;font-size:13px;font-weight:900;pointer-events:none}.node.unit{stroke:var(--mint);stroke-width:4}.node.zero-divisor{stroke:var(--red);stroke-width:4}.node.zero{stroke:var(--gold);stroke-width:4}.dim{opacity:.14}.active-node{filter:drop-shadow(0 0 9px currentColor)}.path{fill:none;stroke:var(--gold);stroke-width:4;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 5px #ffd16666)}.path-secondary{fill:none;stroke:var(--blue);stroke-width:3;stroke-linecap:round;opacity:.85}.center-main{fill:var(--ink);text-anchor:middle;font-size:20px;font-weight:850}.center-sub{fill:var(--muted);text-anchor:middle;font-size:12px}.step-badge{fill:var(--gold);stroke:#071018;stroke-width:2}.step-text{fill:#071018;text-anchor:middle;dominant-baseline:central;font-size:11px;font-weight:900}.stage-status{position:absolute;left:13px;bottom:10px;color:var(--muted);font-size:.8rem;pointer-events:none}
    .lower{margin-top:16px;padding:15px}.lower[hidden]{display:none}.lower-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}.lower-head h2{margin:0}.scroll{overflow:auto;max-height:430px}.math-table{border-collapse:separate;border-spacing:3px;margin:auto;font-variant-numeric:tabular-nums}.math-table th,.math-table td{min-width:38px;height:36px;padding:5px;text-align:center;border:1px solid var(--line);border-radius:4px;background:var(--panel2);cursor:pointer}.math-table th{color:var(--muted);position:sticky;background:#14222d}.math-table thead th{top:0;z-index:2}.math-table tbody th{left:0;z-index:1}.math-table td:hover,.math-table td.active{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
    .legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:11px;color:var(--muted);font-size:.8rem}.key{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:-1px}.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.compare-card{border:1px solid var(--line);border-radius:7px;background:var(--panel2);min-width:0}.compare-card svg{height:auto;aspect-ratio:1}.compare-card h3{margin:10px 12px 0;font-size:.95rem}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    @media(max-width:780px){.layout{grid-template-columns:1fr}.stage{min-height:500px}svg{height:520px}.compare-grid{grid-template-columns:1fr}.tabs{margin-inline:-2.5vw;padding-left:2.5vw}.math-table th,.math-table td{min-width:34px;height:34px}}
    .path.animate{stroke-dasharray:700;stroke-dashoffset:700;animation:draw-path .85s ease-out forwards}@keyframes draw-path{to{stroke-dashoffset:0}}
  </style>
</head>
<body><main>
  <h1>Modular Arithmetic Circle Lab</h1><p class="sub">Explore congruence classes, operations, cyclic structure, and comparisons.</p>
  <nav class="tabs" aria-label="Visualizer modes">
    <button class="tab active" data-mode="classes">Classes</button><button class="tab" data-mode="operations">Operations</button><button class="tab" data-mode="structure">Structure</button><button class="tab" data-mode="compare">Compare</button>
  </nav>
  <section class="layout">
    <aside class="panel">
      <label for="modulus"><span>Modulus</span><output id="modulusValue">7</output></label><input id="modulus" type="number" min="2" max="16" value="7">
      <section class="control-pane active" data-pane="classes">
        <label for="count"><span>Integers shown</span><output id="countValue">35</output></label><input id="count" type="range" min="8" max="100" value="35">
        <label for="start">First integer</label><input id="start" type="number" min="-100" max="100" value="0">
        <label for="speed"><span>Animation speed</span><output id="speedValue">700 ms</output></label><input id="speed" type="range" min="150" max="1400" step="50" value="700">
        <div class="buttons"><button id="step">Next integer</button><button id="play" class="primary">Play</button></div>
        <div class="buttons"><button id="resetAnimation">Reset</button><button id="nextClass">Next class</button></div>
      </section>
      <section class="control-pane" data-pane="operations">
        <label for="operation">Operation</label><select id="operation"><option value="add">Addition</option><option value="multiply">Multiplication</option><option value="congruence">Congruence test</option></select>
        <div class="field-row"><div><label for="a">Value a</label><input id="a" type="number" value="3"></div><div><label for="b">Value b</label><input id="b" type="number" value="5"></div></div>
        <div class="buttons"><button id="animateOperation" class="primary">Animate</button><button id="swap">Swap a, b</button></div>
        <label for="tableType">Operation table</label><select id="tableType"><option value="addition">Addition table</option><option value="multiplication">Multiplication table</option></select>
      </section>
      <section class="control-pane" data-pane="structure">
        <label for="structureType">View</label><select id="structureType"><option value="classification">Units and zero divisors</option><option value="powers">Power cycle</option><option value="orbit">Additive chord orbit</option></select>
        <label for="generator">Selected residue</label><input id="generator" type="number" min="0" value="3">
        <div class="buttons"><button id="animateStructure" class="primary">Animate path</button><button id="clearPath">Clear path</button></div>
        <div class="legend"><span><i class="key" style="background:var(--mint)"></i>unit</span><span><i class="key" style="background:var(--red)"></i>zero divisor</span><span><i class="key" style="background:var(--gold)"></i>zero</span></div>
      </section>
      <section class="control-pane" data-pane="compare">
        <label for="modulus2">Second modulus</label><input id="modulus2" type="number" min="2" max="16" value="6">
        <label for="compareStep">Highlight step size</label><input id="compareStep" type="number" value="1">
      </section>
      <div class="readout" aria-live="polite"><small id="readoutLabel">Current view</small><strong id="equation">All classes modulo 7</strong><div id="detail" class="detail">Select a residue or start the counting animation.</div></div>
    </aside>
    <section class="stage"><svg id="circle" role="img" aria-label="Modular arithmetic circle"></svg><div id="stageStatus" class="stage-status">Residues are arranged clockwise from zero.</div></section>
  </section>
  <section id="tablePanel" class="lower" hidden><div class="lower-head"><h2 id="tableTitle">Addition modulo 7</h2><button id="hideTable" style="width:auto">Hide table</button></div><div id="tableWrap" class="scroll"></div></section>
  <section id="comparePanel" class="lower" hidden><div class="lower-head"><h2>Side-by-side comparison</h2></div><div class="compare-grid"><article class="compare-card"><h3 id="compareTitle1"></h3><svg id="compareCircle1"></svg></article><article class="compare-card"><h3 id="compareTitle2"></h3><svg id="compareCircle2"></svg></article></div></section>
</main><script>
const NS='http://www.w3.org/2000/svg',$=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const els={modulus:$('#modulus'),count:$('#count'),start:$('#start'),speed:$('#speed'),operation:$('#operation'),a:$('#a'),b:$('#b'),tableType:$('#tableType'),structureType:$('#structureType'),generator:$('#generator'),modulus2:$('#modulus2'),compareStep:$('#compareStep')};
let state={mode:'classes',selected:null,reveal:0,playing:false,timer:null,pathProgress:Infinity,path:[],tableCell:null};
const clamp=(v,min,max,fallback)=>Math.max(min,Math.min(max,Math.trunc(Number(v)||fallback))),mod=(n,m)=>((n%m)+m)%m;
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b)[a,b]=[b,a%b];return a}
function colorFor(r){return `hsl(${(r*137.508+12)%360} 76% ${r%2?62:69}%)`}
function sEl(name,attrs={},text=''){const e=document.createElementNS(NS,name);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));if(text!=='')e.textContent=text;return e}
function getValues(){const m=clamp(els.modulus.value,2,16,7),count=clamp(els.count.value,8,100,35),start=clamp(els.start.value,-100,100,0),m2=clamp(els.modulus2.value,2,16,6);els.modulus.value=m;els.count.value=count;els.start.value=start;els.modulus2.value=m2;els.generator.max=m-1;els.generator.value=mod(Number(els.generator.value)||0,m);return{m,count,start,m2,a:Math.trunc(Number(els.a.value)||0),b:Math.trunc(Number(els.b.value)||0),g:mod(Number(els.generator.value)||0,m)}}
function point(r,m,cx=360,cy=325,radius=240){const angle=-Math.PI/2+r*Math.PI*2/m;return{x:cx+Math.cos(angle)*radius,y:cy+Math.sin(angle)*radius}}
function stop(){clearTimeout(state.timer);state.timer=null;state.playing=false;$('#play').textContent='Play'}
function setReadout(label,equation,detail){$('#readoutLabel').textContent=label;$('#equation').textContent=equation;$('#detail').textContent=detail}
function baseCircle(svg,m,{compact=false,classes=[]}={}){svg.replaceChildren();svg.setAttribute('viewBox','0 0 720 650');const cx=360,cy=325,radius=compact?225:240;svg.append(sEl('circle',{cx,cy,r:radius,class:'ring','stroke-width':2}));for(let r=0;r<m;r++){const p=point(r,m,cx,cy,radius),active=classes.includes(r);svg.append(sEl('line',{x1:cx,y1:cy,x2:p.x,y2:p.y,class:`spoke${classes.length&&!active?' dim':''}`}));const group=sEl('g',{tabindex:compact?'-1':'0',role:'button','aria-label':`Residue ${r} modulo ${m}`,class:classes.length&&!active?'dim':''});let cls='node';if(state.mode==='structure'&&els.structureType.value==='classification'){if(r===0)cls+=' zero';else if(gcd(r,m)===1)cls+=' unit';else cls+=' zero-divisor'}if(active)cls+=' active-node';const color=colorFor(r);group.append(sEl('circle',{cx:p.x,cy:p.y,r:compact?20:23,fill:color,class:cls,style:`color:${color}`}),sEl('text',{x:p.x,y:p.y,class:'node-text'},r));if(!compact){group.onclick=()=>{state.selected=state.selected===r?null:r;render()};group.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();group.onclick()}}}svg.append(group)}svg.append(sEl('circle',{cx,cy,r:65,fill:'#111d27',stroke:'#405767','stroke-width':2}),sEl('text',{x:cx,y:cy-5,class:'center-main'},`mod ${m}`),sEl('text',{x:cx,y:cy+18,class:'center-sub'},`${m} residue classes`));return{cx,cy,radius}}
function drawPolyline(svg,path,m,className='path',progress=Infinity){if(path.length<2)return;const pts=path.slice(0,progress+1).map(r=>point(r,m));svg.insertBefore(sEl('polyline',{points:pts.map(p=>`${p.x},${p.y}`).join(' '),class:className}),svg.firstChild.nextSibling);pts.forEach((p,i)=>{if(i===0)return;svg.append(sEl('circle',{cx:p.x,cy:p.y,r:11,class:'step-badge'}),sEl('text',{x:p.x,y:p.y,class:'step-text'},i))})}
function arcPath(svg,from,to,m,className='path'){const p1=point(from,m),p2=point(to,m),sweep=1;svg.insertBefore(sEl('path',{d:`M ${p1.x} ${p1.y} Q 360 325 ${p2.x} ${p2.y}`,class:className,'marker-end':'url(#arrow)'}),svg.firstChild.nextSibling)}
function addDefs(svg){const defs=sEl('defs'),marker=sEl('marker',{id:'arrow',viewBox:'0 0 10 10',refX:9,refY:5,markerWidth:7,markerHeight:7,orient:'auto-start-reverse'});marker.append(sEl('path',{d:'M 0 0 L 10 5 L 0 10 z',fill:'#ffd166'}));defs.append(marker);svg.prepend(defs)}
function renderClasses(svg,m,count,start){let classes=state.selected===null?[]:[state.selected];if(state.reveal>0)classes=[mod(start+state.reveal-1,m)];baseCircle(svg,m,{classes});const visible=Math.min(state.reveal,count);if(visible){for(let i=0;i<visible;i++){const n=start+i,r=mod(n,m),p=point(r,m),angle=-Math.PI/2+r*Math.PI*2/m,layer=Math.floor(i/m),rr=240-layer*18,x=360+Math.cos(angle)*rr,y=325+Math.sin(angle)*rr;svg.append(sEl('circle',{cx:x,cy:y,r:Math.max(5,10-layer*.4),fill:colorFor(r),stroke:'#071018','stroke-width':1.5}),sEl('title',{},`${n} ≡ ${r} (mod ${m})`))}const n=start+visible-1,r=mod(n,m);setReadout('Counting integers',`${n} ≡ ${r} (mod ${m})`,`${n} belongs to residue class [${r}]. ${visible} of ${count} integers placed.`)}else if(state.selected!==null){const members=[];for(let n=start;n<start+count;n++)if(mod(n,m)===state.selected)members.push(n);setReadout('Selected class',`n ≡ ${state.selected} (mod ${m})`,`[${state.selected}] = { ..., ${members.join(', ')}, ... }`)}else setReadout('Current view',`All classes modulo ${m}`,'Select a residue or start the counting animation.')}
function operationData(m,a,b){const ra=mod(a,m),rb=mod(b,m),type=els.operation.value;if(type==='add')return{classes:[ra,rb,mod(a+b,m)],result:mod(a+b,m),equation:`(${a} + ${b}) mod ${m} = ${mod(a+b,m)}`,detail:`[${ra}] + [${rb}] = [${mod(a+b,m)}]`,path:[ra,mod(a+b,m)]};if(type==='multiply')return{classes:[ra,rb,mod(a*b,m)],result:mod(a*b,m),equation:`(${a} × ${b}) mod ${m} = ${mod(a*b,m)}`,detail:`[${ra}] × [${rb}] = [${mod(a*b,m)}]`,path:[ra,mod(a*b,m)]};const yes=mod(a-b,m)===0;return{classes:[ra,rb],result:yes,equation:`${a} ${yes?'≡':'≢'} ${b} (mod ${m})`,detail:yes?`${a-b} = ${m} × ${(a-b)/m}, so ${m} divides a − b.`:`${a-b} is not divisible by ${m}, so the residues ${ra} and ${rb} differ.`,path:[]}}
function renderOperations(svg,m,a,b){const d=operationData(m,a,b);baseCircle(svg,m,{classes:d.classes});addDefs(svg);if(d.path.length)arcPath(svg,d.path[0],d.path[1],m);setReadout(els.operation.options[els.operation.selectedIndex].text,d.equation,d.detail);renderTable(m)}
function powerPath(g,m){const out=[1%m];let x=1%m;for(let i=0;i<=m*2;i++){x=mod(x*g,m);out.push(x);if(x===out[0])break;if(out.slice(0,-1).includes(x))break}return out}
function orbitPath(g,m){const out=[0],seen=new Set([0]);let x=0;while(true){x=mod(x+g,m);out.push(x);if(seen.has(x))break;seen.add(x)}return out}
function renderStructure(svg,m,g){const type=els.structureType.value;if(type==='classification'){baseCircle(svg,m);const units=[],zeros=[];for(let r=1;r<m;r++)(gcd(r,m)===1?units:zeros).push(r);setReadout('Ring structure',`ℤ/${m}ℤ has ${units.length} units`,`Units: ${units.join(', ')||'none'}. Zero divisors: ${zeros.join(', ')||'none'}.`);return}const path=type==='powers'?powerPath(g,m):orbitPath(g,m);state.path=path;baseCircle(svg,m,{classes:[...new Set(path)]});drawPolyline(svg,path,m,'path',state.pathProgress);if(type==='powers')setReadout('Multiplication cycle',`Powers of ${g} modulo ${m}`,path.map((r,i)=>`${g}^${i} ≡ ${r}`).join('  •  '));else setReadout('Additive orbit',`Repeatedly add ${g} modulo ${m}`,`${path.join(' → ')}. The orbit visits ${new Set(path).size} of ${m} residues.`)}
function renderSmallCircle(svg,m,step){baseCircle(svg,m,{compact:true});const path=orbitPath(mod(step,m),m);const mapped=path.map(r=>{const a=-Math.PI/2+r*Math.PI*2/m;return{x:360+Math.cos(a)*225,y:325+Math.sin(a)*225}});svg.insertBefore(sEl('polyline',{points:mapped.map(p=>`${p.x},${p.y}`).join(' '),class:'path-secondary'}),svg.firstChild.nextSibling)}
function renderCompare(m,m2){$('#comparePanel').hidden=false;const step=Math.trunc(Number(els.compareStep.value)||1);$('#compareTitle1').textContent=`Step ${step} modulo ${m}`;$('#compareTitle2').textContent=`Step ${step} modulo ${m2}`;renderSmallCircle($('#compareCircle1'),m,step);renderSmallCircle($('#compareCircle2'),m2,step);baseCircle($('#circle'),m,{classes:[...new Set(orbitPath(mod(step,m),m))]});setReadout('Comparing additive orbits',`Step ${step}: mod ${m} versus mod ${m2}`,`The paths visit ${m/gcd(step,m)} and ${m2/gcd(step,m2)} distinct residues respectively.`)}
function renderTable(m){if(state.mode!=='operations'){ $('#tablePanel').hidden=true;return}$('#tablePanel').hidden=false;const multiply=els.tableType.value==='multiplication';$('#tableTitle').textContent=`${multiply?'Multiplication':'Addition'} modulo ${m}`;const table=document.createElement('table');table.className='math-table';const head=document.createElement('thead'),hr=document.createElement('tr');hr.innerHTML=`<th>${multiply?'×':'+'}</th>`+Array.from({length:m},(_,i)=>`<th>${i}</th>`).join('');head.append(hr);table.append(head);const body=document.createElement('tbody');for(let r=0;r<m;r++){const tr=document.createElement('tr');tr.innerHTML=`<th>${r}</th>`;for(let c=0;c<m;c++){const result=mod(multiply?r*c:r+c,m),td=document.createElement('td');td.textContent=result;td.style.color=colorFor(result);if(state.tableCell&&state.tableCell[0]===r&&state.tableCell[1]===c)td.className='active';td.onclick=()=>{state.tableCell=[r,c];els.a.value=r;els.b.value=c;els.operation.value=multiply?'multiply':'add';render()};tr.append(td)}body.append(tr)}table.append(body);$('#tableWrap').replaceChildren(table)}
function updateUrl(){const{m,count,start,m2,a,b}=getValues(),p=new URLSearchParams({mode:state.mode,m,count,start,m2,op:els.operation.value,a,b,table:els.tableType.value,view:els.structureType.value,g:els.generator.value,step:els.compareStep.value});if(state.selected!==null)p.set('selected',state.selected);try{history.replaceState(null,'',`${location.pathname}?${p}#${state.mode}`)}catch(error){location.hash=state.mode}}
function render(){const{m,count,start,m2,a,b,g}=getValues();$('#modulusValue').textContent=m;$('#countValue').textContent=count;$('#speedValue').textContent=`${els.speed.value} ms`;$('#comparePanel').hidden=state.mode!=='compare';$('#tablePanel').hidden=state.mode!=='operations';const svg=$('#circle');if(state.mode==='classes')renderClasses(svg,m,count,start);if(state.mode==='operations')renderOperations(svg,m,a,b);if(state.mode==='structure')renderStructure(svg,m,g);if(state.mode==='compare')renderCompare(m,m2);$('#stageStatus').textContent=state.mode==='classes'?'Residues are arranged clockwise from zero.':state.mode==='operations'?'The highlighted arc lands on the operation result.':state.mode==='structure'?'Numbered badges show the order of the cycle.':'The full comparison appears below the main circle.';updateUrl()}
function switchMode(mode){stop();state.mode=mode;state.pathProgress=Infinity;$$('.tab').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$$('.control-pane').forEach(p=>p.classList.toggle('active',p.dataset.pane===mode));render()}
function countingStep(){const{count}=getValues();if(state.reveal>=count){stop();return}state.reveal++;render()}
function playCounting(){if(state.playing){stop();return}state.playing=true;$('#play').textContent='Pause';const tick=()=>{countingStep();if(state.playing)state.timer=setTimeout(tick,Number(els.speed.value))};tick()}
function animatePath(){stop();const{m,g}=getValues(),path=els.structureType.value==='powers'?powerPath(g,m):orbitPath(g,m);state.pathProgress=0;let i=0;const tick=()=>{state.pathProgress=i++;render();if(i<path.length)state.timer=setTimeout(tick,550);else state.timer=null};tick()}
function loadUrl(){const p=new URLSearchParams(location.search);if(p.has('m'))els.modulus.value=p.get('m');if(p.has('count'))els.count.value=p.get('count');if(p.has('start'))els.start.value=p.get('start');if(p.has('m2'))els.modulus2.value=p.get('m2');if(p.has('op'))els.operation.value=p.get('op');if(p.has('a'))els.a.value=p.get('a');if(p.has('b'))els.b.value=p.get('b');if(p.has('table'))els.tableType.value=p.get('table');if(p.has('view'))els.structureType.value=p.get('view');if(p.has('g'))els.generator.value=p.get('g');if(p.has('step'))els.compareStep.value=p.get('step');if(p.has('selected'))state.selected=Number(p.get('selected'));const mode=p.get('mode')||location.hash.slice(1);if(['classes','operations','structure','compare'].includes(mode))state.mode=mode;switchMode(state.mode)}
$$('.tab').forEach(b=>b.onclick=()=>switchMode(b.dataset.mode));Object.values(els).forEach(e=>e.addEventListener('input',()=>{if(e===els.modulus){state.selected=null;state.reveal=0;state.pathProgress=Infinity}render()}));
$('#step').onclick=countingStep;$('#play').onclick=playCounting;$('#resetAnimation').onclick=()=>{stop();state.reveal=0;render()};$('#nextClass').onclick=()=>{const{m}=getValues();state.selected=state.selected===null?0:(state.selected+1)%m;state.reveal=0;render()};$('#animateOperation').onclick=()=>{render();const path=$('#circle .path');if(path)path.classList.add('animate')};$('#swap').onclick=()=>{[els.a.value,els.b.value]=[els.b.value,els.a.value];render()};$('#animateStructure').onclick=animatePath;$('#clearPath').onclick=()=>{stop();state.pathProgress=0;render()};$('#hideTable').onclick=()=>{$('#tablePanel').hidden=true};
loadUrl();
</script></body></html>
