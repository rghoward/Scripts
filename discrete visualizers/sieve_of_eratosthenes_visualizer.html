<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sieve of Eratosthenes Visualizer</title>
  <style>
    :root{color-scheme:dark;--bg:#07121f;--panel:#101f31;--line:#2a425d;--ink:#eef6ff;--muted:#9fb3c9;--cyan:#45ddd2;--gold:#ffc857;--red:#ff7187;--blue:#4e9cff}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0,#173955,transparent 38%),var(--bg);color:var(--ink);font:15px/1.45 Inter,system-ui,sans-serif}main{width:min(1120px,94vw);margin:30px auto}h1{margin:0;font-size:clamp(1.8rem,4vw,2.7rem)}.sub{margin:5px 0 22px;color:var(--muted)}.layout{display:grid;grid-template-columns:285px 1fr;gap:18px}.card{background:#101f31ef;border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 55px #0005}aside{padding:18px}label{display:block;color:var(--muted);font-size:.84rem;margin:8px 0 5px}input,button{width:100%;padding:11px;border:1px solid #38546f;border-radius:9px;background:#091728;color:var(--ink);font:inherit}input:focus{outline:2px solid #45ddd255;border-color:var(--cyan)}button{cursor:pointer;font-weight:750;transition:.15s}button:hover{transform:translateY(-1px);border-color:var(--cyan)}.primary{background:var(--cyan);color:#052521;border:0}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}#status{min-height:65px;margin-top:14px;padding:11px;border-radius:9px;background:#091627;color:var(--muted)}#status.good{color:#8bf0bc}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.stat{padding:10px;text-align:center;border:1px solid var(--line);border-radius:9px}.stat b{display:block;color:var(--cyan);font-size:1.35rem}.stat small{color:var(--muted)}.legend{font-size:.8rem;color:var(--muted);margin-top:14px}.key{display:inline-block;width:9px;height:9px;border-radius:3px;margin:0 4px 0 10px}.key:first-child{margin-left:0}.board-card{padding:18px}.board{display:grid;grid-template-columns:repeat(auto-fit,minmax(48px,1fr));gap:7px}.cell{position:relative;aspect-ratio:1;display:grid;place-items:center;min-height:43px;border:1px solid #35516e;border-radius:9px;background:#0a1829;font-weight:750;font-variant-numeric:tabular-nums;transition:background .25s,transform .25s,opacity .25s,border-color .25s}.cell.one{color:#6f8298;background:#0a1421}.cell.prime{background:#123b3d;border-color:var(--cyan);color:#a8fff5}.cell.active{background:var(--gold);border-color:#ffe09a;color:#312000;transform:scale(1.08);z-index:2;box-shadow:0 0 18px #ffc85777}.cell.composite{color:#6e7d90;background:#111a27;opacity:.55;text-decoration:line-through}.cell.new{background:var(--red);border-color:#ffb0bb;color:#26070d;opacity:1;animation:pulse .45s ease}.cell.multiple::after{content:'';position:absolute;inset:5px;border:2px solid var(--gold);border-radius:6px}@keyframes pulse{50%{transform:scale(1.13)}}.explain{margin-top:18px;padding:14px;border:1px solid var(--line);border-radius:11px;background:#091728;color:var(--muted)}.explain strong{color:var(--gold)}@media(max-width:720px){.layout{grid-template-columns:1fr}.board{grid-template-columns:repeat(auto-fit,minmax(40px,1fr))}}
  </style>
</head>
<body><main>
  <h1>Sieve of Eratosthenes</h1><p class="sub">Discover every prime by repeatedly crossing out multiples.</p>
  <section class="layout"><aside class="card">
    <label for="limit">Find primes up to</label><input id="limit" type="number" min="2" max="500" value="100">
    <div class="row"><button id="reset">Reset</button><button id="step" class="primary">Next step</button></div>
    <div class="row"><button id="play">▶ Animate</button><button id="finish">Finish</button></div>
    <div id="status" aria-live="polite">Ready. Start with 2, the first prime.</div>
    <div class="stats"><div class="stat"><b id="primeCount">0</b><small>primes found</small></div><div class="stat"><b id="current">—</b><small>current prime</small></div></div>
    <div id="stopCheck" class="explain">Stopping check: —</div>
    <div class="legend"><span class="key" style="background:var(--gold)"></span>current <span class="key" style="background:#123b3d"></span>prime <span class="key" style="background:#27303d"></span>crossed out</div>
  </aside><section class="card board-card"><div id="board" class="board"></div><div id="explain" class="explain">Numbers greater than 1 begin as possible primes.</div></section></section>
</main><script>
const $=s=>document.querySelector(s);let limit=100,composite=[],primes=[],candidate=2,multiples=[],multipleIndex=0,phase='select',done=false,timer=null,lastMarked=null;
function reset(){stop();limit=Math.max(2,Math.min(500,Math.trunc(Number($('#limit').value)||100)));$('#limit').value=limit;composite=Array(limit+1).fill(false);primes=[];candidate=2;multiples=[];multipleIndex=0;phase='select';done=false;lastMarked=null;setStatus('Ready. Start with 2, the first prime.','');render()}
function nextCandidate(){while(candidate<=Math.sqrt(limit)&&composite[candidate])candidate++;if(candidate>Math.sqrt(limit)){for(let n=2;n<=limit;n++)if(!composite[n]&&!primes.includes(n))primes.push(n);done=true;phase='done';setStatus(`Complete: found ${primes.length} primes up to ${limit}.`,'good');stop();return}if(!primes.includes(candidate))primes.push(candidate);multiples=[];for(let m=candidate*candidate;m<=limit;m+=candidate)if(!composite[m])multiples.push(m);multipleIndex=0;phase=multiples.length?'mark':'advance';setStatus(`${candidate} is prime. Now cross out its multiples.`,'');$('#explain').innerHTML=`Start at <strong>${candidate}² = ${candidate*candidate}</strong>. Smaller multiples were already handled by earlier primes.`}
function step(){if(done)return;if(phase==='select'){nextCandidate()}else if(phase==='mark'){lastMarked=multiples[multipleIndex++];composite[lastMarked]=true;setStatus(`Cross out ${lastMarked} because ${lastMarked} = ${candidate} × ${lastMarked/candidate}.`,'');$('#explain').innerHTML=`<strong>${lastMarked}</strong> is composite: ${candidate} × ${lastMarked/candidate}.`;if(multipleIndex>=multiples.length)phase='advance'}else if(phase==='advance'){candidate++;lastMarked=null;phase='select';nextCandidate()}render()}
function finish(){let guard=2000;while(!done&&guard--)step()}
function stop(){clearTimeout(timer);timer=null;$('#play').textContent='▶ Animate'}function setStatus(t,c){$('#status').textContent=t;$('#status').className=c}
function render(){let html='';for(let n=1;n<=limit;n++){let cls='cell';if(n===1)cls+=' one';else if(composite[n])cls+=' composite';else if(primes.includes(n))cls+=' prime';if(!done&&n===candidate&&phase!=='select')cls+=' active';if(n===lastMarked)cls+=' new';else if(phase==='mark'&&multiples.slice(multipleIndex).includes(n))cls+=' multiple';html+=`<div class="${cls}" title="${n}${composite[n]?' is composite':primes.includes(n)?' is prime':' is not classified yet'}">${n}</div>`}$('#board').innerHTML=html;$('#primeCount').textContent=primes.length;$('#current').textContent=done?'—':candidate;const root=Math.sqrt(limit),passes=candidate<=root;$('#stopCheck').innerHTML=done?`<strong>Stop:</strong> ${candidate} &gt; √${limit} ≈ ${root.toFixed(2)}.<br>Every remaining unmarked number is prime.`:`Stopping check: <strong>${candidate} ${passes?'≤':'>'} √${limit} ≈ ${root.toFixed(2)}</strong>`}
function animate(){if(timer!==null)return;$('#play').textContent='⏸ Pause';const tick=()=>{timer=null;if(done){stop();return}step();if(done){stop();return}const delay=(phase==='mark'&&multipleIndex===0)?1300:phase==='advance'?900:320;timer=setTimeout(tick,delay)};timer=setTimeout(tick,250)}
$('#reset').onclick=reset;$('#step').onclick=step;$('#finish').onclick=finish;$('#limit').onchange=reset;$('#play').onclick=()=>timer!==null?stop():animate();reset();
</script></body></html>
