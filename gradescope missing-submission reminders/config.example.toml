[microsoft]
client_id = "YOUR_APPLICATION_CLIENT_ID"
tenant_id = "YOUR_DIRECTORY_TENANT_ID"
redirect_uri = "http://localhost:8765/callback"
keychain_account = "gradescope-reminder"
keychain_service = "gradescope-reminder-client-secret"
client_secret_env = "GRADESCOPE_REMINDER_CLIENT_SECRET"

[gradescope]
email = "YOUR_GRADESCOPE_EMAIL"
keychain_service = "gradescope-reminder-gradescope-password"
password_env = "GRADESCOPE_REMINDER_PASSWORD"

[schedule]
timezone = "America/New_York"
check_delay_minutes = 5

[delivery]
mode = "dry-run"
summary_email = "YOUR_GT_EMAIL"

[[courses]]
id = "GRADESCOPE_COURSE_ID"
code = "CS 1301"
name = "Course name"
term = "Fall 2026"
assignment_pattern = '(?i)\b(?:hw|homework)\s*0*\d+\b'
late_hours = 24
policy = "Course-specific student-facing late policy."

# Optional one-assignment exception. Keep real student exceptions only in
# config.local.toml, which is excluded from Git.
#[[exclusions]]
#course_id = "GRADESCOPE_COURSE_ID"
#assignment_id = "GRADESCOPE_ASSIGNMENT_ID"
#email = "student@example.edu"
#reason = "Instructor-approved exception"
